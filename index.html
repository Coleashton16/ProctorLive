<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Assessment Portal | ProctorLive</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat (v8 scripts) to avoid Module/Import errors in Babel Standalone -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Font: Inter & Merriweather (for clinical reading) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; user-select: none; }
        .font-serif { font-family: 'Merriweather', serif; }
        .scroller::-webkit-scrollbar { width: 8px; }
        .scroller::-webkit-scrollbar-track { background: #f8fafc; border-left: 1px solid #e2e8f0; }
        .scroller::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scroller::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
    // --- Firebase Compatibility Shim ---
    const firebaseConfig = {
      apiKey: "AIzaSyCaex4bB5r2lVHPblC5pc0wCPIl8uUbtKw",
      authDomain: "proctorlive-dae37.firebaseapp.com",
      projectId: "proctorlive-dae37",
      storageBucket: "proctorlive-dae37.firebasestorage.app",
      messagingSenderId: "1063605117912",
      appId: "1:1063605117912:web:eea13aa3e743d55ee308ad",
      measurementId: "G-5RSFDE9W8Q"
    };

    // Initialize using compat
    firebase.initializeApp(firebaseConfig);
    const authGlobal = firebase.auth();
    const dbGlobal = firebase.firestore();

    // Modular aliases to keep your v9-style code working
    const initializeApp = () => firebase.app();
    const getAuth = () => authGlobal;
    const getFirestore = () => dbGlobal;
    const onAuthStateChanged = (a, cb) => a.onAuthStateChanged(cb);
    const signInWithEmailAndPassword = (a, e, p) => a.signInWithEmailAndPassword(e, p);
    const createUserWithEmailAndPassword = (a, e, p) => a.createUserWithEmailAndPassword(e, p);
    const signOut = (a) => a.signOut();
    const updateProfile = (u, data) => u.updateProfile(data);
    
    // Firestore aliases
    const collection = (db, ...path) => db.collection(path.join('/'));
    const doc = (db, ...path) => db.doc(path.join('/'));
    const addDoc = (coll, data) => coll.add(data);
    const setDoc = (docRef, data, options) => docRef.set(data, options);
    const updateDoc = (docRef, data) => docRef.update(data);
    const deleteDoc = (docRef) => docRef.delete();
    const serverTimestamp = () => firebase.firestore.FieldValue.serverTimestamp();
    
    const query = (coll, ...constraints) => {
        let q = coll;
        constraints.forEach(c => { q = c(q); });
        return q;
    };
    const where = (field, op, val) => (q) => q.where(field, op, val);
    const orderBy = (field, dir) => (q) => q.orderBy(field, dir || 'asc');
    const onSnapshot = (q, next, error) => q.onSnapshot(next, error);
    const getDoc = (docRef) => docRef.get();
    const getDocs = (q) => q.get();

    const auth = getAuth();
    const db = getFirestore();

    // --- Icons Helper (Expanded with clinical feeling UI icons) ---
    const Icon = ({ name, size = 20, className = "" }) => {
        const icons = {
            calculator: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/><line x1="8" y1="13" x2="8" y2="13.01"/><line x1="16" y1="13" x2="16" y2="13.01"/><line x1="8" y1="17" x2="8" y2="17.01"/><line x1="16" y1="17" x2="16" y2="17.01"/></>,
            clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            chevronRight: <polyline points="9 18 15 12 9 6"/>,
            alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
            check: <polyline points="20 6 9 17 4 12"/>,
            user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>,
            mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
            key: <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>,
            lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
            book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></>,
            grad: <><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></>,
            logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></>,
            search: <><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></>,
            eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
            x: <path d="M18 6L6 18M6 6l12 12" />,
            shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M8 11h8M12 7v8"/></>,
            radioEmpty: <circle cx="12" cy="12" r="9" />,
            radioFilled: <><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="4" fill="currentColor"/></>,
            checkboxEmpty: <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />,
            checkboxFilled: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="currentColor" /><polyline points="9 11 12 14 22 4" stroke="white" strokeWidth="2" fill="none"/></>,
            info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>
        };
        const renderPath = icons[name] || icons.clock;
        return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{renderPath}</svg>;
    };

    function App() {
        const [user, setUser] = React.useState(null);
        const [loading, setLoading] = React.useState(true);
        const [view, setView] = React.useState('auth'); // auth, dashboard, exam, review
        
        // Active Data State
        const [activeExamData, setActiveExamData] = React.useState(null);
        const [activeQuestions, setActiveQuestions] = React.useState([]);
        const [activeSession, setActiveSession] = React.useState(null); 
        const [activeRequestId, setActiveRequestId] = React.useState(null);

        React.useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                setLoading(false);
                if (currentUser && view === 'auth') setView('dashboard');
                if (!currentUser) setView('auth');
            });
            return () => unsubscribe();
        }, []);

        const startExam = (exam, questions, sessionId) => {
            setActiveExamData(exam);
            setActiveQuestions(questions);
            setActiveSession({id: sessionId});
            setView('exam');
        };

        const startReview = async (session, requestId) => {
            try {
                // Fetch Questions
                const qQuery = query(collection(db, "questions"), where("examId", "==", session.examId));
                const qSnap = await getDocs(qQuery);
                const questions = qSnap.docs.map(d => ({id: d.id, ...d.data()}));
                questions.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

                setActiveExamData({ title: session.examTitle });
                setActiveQuestions(questions);
                setActiveSession(session);
                setActiveRequestId(requestId);
                setView('review');
            } catch (e) {
                console.error("Failed to start review:", e);
                alert("Error loading review. Please try again.");
            }
        };

        const handleFinish = () => {
            setView('dashboard');
            setActiveExamData(null);
            setActiveSession(null);
            setActiveRequestId(null);
        };

        if (loading) return <div className="h-screen flex items-center justify-center bg-slate-100 text-blue-900 font-medium">Initializing Clinical Environment...</div>;

        return (
            <>
                {view === 'auth' && <AuthScreen setUser={setUser} setView={setView} />}
                {view === 'dashboard' && <DashboardLayout user={user} db={db} onStartExam={startExam} onStartReview={startReview} />}
                {view === 'exam' && <ExamInterface db={db} student={{name: user.displayName, uid: user.uid}} exam={activeExamData} questions={activeQuestions} sessionId={activeSession.id} onFinish={handleFinish} />}
                {view === 'review' && <ReviewInterface db={db} session={activeSession} questions={activeQuestions} requestId={activeRequestId} onClose={handleFinish} />}
            </>
        );
    }

    // --- 1. AUTH SCREEN ---
    function AuthScreen({ setUser, setView }) {
        const [isRegister, setIsRegister] = React.useState(false);
        const [email, setEmail] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [name, setName] = React.useState('');
        const [error, setError] = React.useState('');
        const [busy, setBusy] = React.useState(false);

        const handleSubmit = async (e) => {
            e.preventDefault();
            setError('');
            setBusy(true);
            try {
                if (isRegister) {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: name });
                    await setDoc(doc(db, "users", cred.user.uid), {
                        name: name, email: email, role: 'student', createdAt: serverTimestamp()
                    });
                    setUser(cred.user);
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, password);
                    setUser(cred.user);
                }
                setView('dashboard');
            } catch (err) { setError(err.message.replace('Firebase: ', '')); } finally { setBusy(false); }
        };

        return (
            <div className="min-h-screen flex bg-slate-50">
                {/* Brand Side (Left) */}
                <div className="hidden lg:flex lg:w-1/2 bg-blue-900 flex-col items-center justify-center relative overflow-hidden">
                    {/* Professional Geometric Pattern */}
                    <div className="absolute inset-0 opacity-10">
                        <svg className="h-full w-full" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" strokeWidth="1" />
                                </pattern>
                            </defs>
                            <rect width="100%" height="100%" fill="url(#grid)" />
                        </svg>
                    </div>
                    <div className="z-10 text-center px-12 text-white">
                        <div className="bg-blue-800/50 p-6 rounded-2xl inline-block mb-8 border border-blue-700/50 backdrop-blur-sm">
                            <Icon name="shield" size={64} className="text-blue-100 mx-auto" />
                        </div>
                        <h1 className="text-4xl font-bold tracking-tight mb-4 text-white">Clinical Assessment Portal</h1>
                        <p className="text-blue-200 text-lg max-w-md mx-auto leading-relaxed">Secure, high-fidelity testing environment for nursing and healthcare professionals.</p>
                    </div>
                </div>

                {/* Auth Form Side (Right) */}
                <div className="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-12">
                    <div className="w-full max-w-md bg-white p-10 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
                        <div className="text-left mb-8">
                            <h2 className="text-2xl font-bold text-slate-900 mb-2">{isRegister ? "Candidate Registration" : "Candidate Login"}</h2>
                            <p className="text-slate-500 text-sm">{isRegister ? "Create your candidate profile to access assigned assessments." : "Authenticate to access your testing dashboard."}</p>
                        </div>

                        {error && <div className="bg-red-50 text-red-700 p-4 rounded-md mb-6 text-sm border border-red-200 flex gap-3 items-start"><Icon name="alert" size={18} className="shrink-0 mt-0.5" />{error}</div>}
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            {isRegister && (
                                <div>
                                    <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Legal Name</label>
                                    <div className="relative">
                                        <Icon name="user" className="absolute left-3.5 top-3 text-slate-400" size={18} />
                                        <input type="text" placeholder="First & Last Name" className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 outline-none focus:bg-white focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-sm" value={name} onChange={e => setName(e.target.value)} required />
                                    </div>
                                </div>
                            )}
                            <div>
                                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Email Address</label>
                                <div className="relative">
                                    <Icon name="mail" className="absolute left-3.5 top-3 text-slate-400" size={18} />
                                    <input type="email" placeholder="student@institution.edu" className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 outline-none focus:bg-white focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-sm" value={email} onChange={e => setEmail(e.target.value)} required />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Password</label>
                                <div className="relative">
                                    <Icon name="lock" className="absolute left-3.5 top-3 text-slate-400" size={18} />
                                    <input type="password" placeholder="••••••••" className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-md text-slate-900 placeholder-slate-400 outline-none focus:bg-white focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all text-sm" value={password} onChange={e => setPassword(e.target.value)} required />
                                </div>
                            </div>
                            
                            <button disabled={busy} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-md transition-colors flex justify-center items-center mt-2">
                                {busy ? 'Authenticating...' : (isRegister ? 'Register Account' : 'Secure Sign In')}
                            </button>
                        </form>
                        
                        <div className="mt-8 pt-6 border-t border-slate-100 text-center">
                            <button onClick={() => setIsRegister(!isRegister)} className="text-blue-700 hover:text-blue-800 text-sm font-medium transition-colors">
                                {isRegister ? "Return to Login" : "First time user? Register here"}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // --- 2. DASHBOARD LAYOUT ---
    function DashboardLayout({ user, db, onStartExam, onStartReview }) {
        const [activeTab, setActiveTab] = React.useState('exams'); 

        return (
            <div className="flex h-screen bg-slate-50">
                {/* Clinical / EHR Style Sidebar */}
                <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-10">
                    <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="w-10 h-10 rounded-md bg-blue-100 text-blue-800 border border-blue-200 flex items-center justify-center font-bold text-lg">
                                {user.displayName ? user.displayName.charAt(0).toUpperCase() : 'C'}
                            </div>
                            <div className="overflow-hidden">
                                <h3 className="font-semibold text-sm text-slate-900 truncate">{user.displayName || 'Candidate'}</h3>
                                <p className="text-xs text-slate-500 truncate">{user.email}</p>
                            </div>
                        </div>
                        <div className="mt-4 text-xs font-mono text-slate-500 bg-slate-100 inline-block px-2 py-1 rounded border border-slate-200">
                            Student ID: {user.uid.substring(0, 8).toUpperCase()}
                        </div>
                    </div>
                    
                    <nav className="flex-1 p-4 space-y-1">
                        <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 mt-2 px-3">Assessments</div>
                        <button onClick={() => setActiveTab('exams')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-md transition-all text-sm font-medium ${activeTab === 'exams' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                            <Icon name="book" size={18} /> Pending Exams
                        </button>
                        <button onClick={() => setActiveTab('gradebook')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-md transition-all text-sm font-medium ${activeTab === 'gradebook' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}>
                            <Icon name="grad" size={18} /> Results & Review
                        </button>
                    </nav>
                    
                    <div className="p-4 border-t border-slate-200 bg-slate-50/50">
                        <button onClick={() => signOut(auth)} className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50 hover:text-red-600 transition-colors text-sm font-medium">
                            <Icon name="logout" size={16} /> Secure Sign Out
                        </button>
                    </div>
                </aside>
                
                <main className="flex-1 overflow-hidden flex flex-col">
                    <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
                        <h2 className="text-lg font-semibold text-slate-800">{activeTab === 'exams' ? 'Assessment Dashboard' : 'Performance Records'}</h2>
                        <div className="text-sm text-slate-500 font-medium">Standardized Testing Environment</div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-8 scroller">
                        {activeTab === 'exams' ? <MyExamsView user={user} db={db} onStartExam={onStartExam} /> : <GradebookView user={user} db={db} onStartReview={onStartReview} />}
                    </div>
                </main>
            </div>
        );
    }

    // --- 2a. MY EXAMS VIEW ---
    function MyExamsView({ user, db, onStartExam }) {
        const [exams, setExams] = React.useState([]);
        const [sessions, setSessions] = React.useState({}); 
        const [manualId, setManualId] = React.useState('');
        const [loading, setLoading] = React.useState(true);

        React.useEffect(() => {
            if (!user.email) return;
            const q = query(collection(db, "exams"), where("status", "==", "open"));
            const unsubscribe = onSnapshot(q, (snap) => {
                const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const myExams = list.filter(e => {
                    const isPublic = !e.allowedEmails || e.allowedEmails.length === 0;
                    const isAllowed = e.allowedEmails && e.allowedEmails.includes(user.email);
                    return isPublic || isAllowed;
                });
                setExams(myExams);
                setLoading(false);
            });
            return () => unsubscribe();
        }, [user.email]);

        React.useEffect(() => {
            const q = query(collection(db, "sessions"), where("userId", "==", user.uid));
            const unsubscribe = onSnapshot(q, (snap) => {
                const sessMap = {};
                snap.docs.forEach(doc => { sessMap[doc.data().examId] = doc.data(); });
                setSessions(sessMap);
            });
            return () => unsubscribe();
        }, [user.uid]);

        const handleManualRegister = async (e) => {
            e.preventDefault();
            if (!manualId.trim()) return;
            try {
                const docRef = doc(db, "exams", manualId.trim());
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().status === 'open') { prepareExam(docSnap.id, docSnap.data()); } 
                else { alert("Exam ID not found or closed."); }
            } catch (err) { alert("Error finding exam."); }
        };

        const prepareExam = async (examId, examData) => {
            if (sessions[examId]?.status === 'completed') return;
            const qQuery = query(collection(db, "questions"), where("examId", "==", examId));
            const qSnap = await getDocs(qQuery);
            if (qSnap.empty) { alert("No questions in this exam."); return; }
            const qs = qSnap.docs.map(d => ({id: d.id, ...d.data()})).sort(() => Math.random() - 0.5);
            const sessionId = `${user.uid}_${examId}`;
            await setDoc(doc(db, "sessions", sessionId), {
                userId: user.uid, studentName: user.displayName, studentEmail: user.email, examId: examId, examTitle: examData.title, totalQuestions: qs.length, status: 'active', startTime: serverTimestamp(), lastActive: serverTimestamp(), answers: {}
            }, { merge: true });
            onStartExam(examData, qs, sessionId);
        };

        return (
            <div className="max-w-6xl mx-auto">
                {/* Manual Registration Card */}
                <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <div>
                        <h3 className="font-semibold text-slate-800 text-lg flex items-center gap-2"><Icon name="key" size={20} className="text-blue-600"/> External Exam Code</h3>
                        <p className="text-sm text-slate-500 mt-1">Input the secure assessment ID provided by your clinical instructor.</p>
                    </div>
                    <form onSubmit={handleManualRegister} className="flex gap-3 w-full md:w-auto">
                        <div className="relative flex-1 md:w-64">
                            <input type="text" placeholder="Assessment ID" value={manualId} onChange={e => setManualId(e.target.value)} className="w-full pl-4 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-md outline-none focus:bg-white focus:ring-1 focus:ring-blue-600 focus:border-blue-600 font-mono text-sm uppercase" />
                        </div>
                        <button className="bg-blue-700 text-white px-5 py-2.5 rounded-md font-semibold text-sm hover:bg-blue-800 transition-colors shrink-0">
                            Launch Exam
                        </button>
                    </form>
                </div>

                <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-200 pb-2">Assigned Modules</h3>
                
                {loading ? <div className="text-slate-500 py-10 flex items-center gap-3"><div className="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div> Loading assigned assessments...</div> : (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {exams.map(exam => {
                            const userSession = sessions[exam.id];
                            const isCompleted = userSession?.status === 'completed';
                            const isActive = userSession?.status === 'active';
                            
                            return (
                                <div key={exam.id} className={`bg-white rounded-lg border flex flex-col transition-all relative overflow-hidden ${isCompleted ? 'border-slate-200 bg-slate-50' : 'border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300'}`}>
                                    {isActive && <div className="absolute top-0 left-0 w-full h-1 bg-amber-500"></div>}
                                    <div className="p-6 flex-1">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className={`p-2 rounded-md ${isCompleted ? 'bg-slate-200 text-slate-500' : 'bg-blue-50 text-blue-700'}`}>
                                                <Icon name={isCompleted ? "lock" : "book"} size={24} />
                                            </div>
                                            <span className="text-xs font-bold bg-slate-100 text-slate-600 px-2 py-1.5 rounded-md border border-slate-200 flex items-center gap-1.5">
                                                <Icon name="clock" size={12} /> {exam.timeLimit || 60} MIN
                                            </span>
                                        </div>
                                        <h4 className="font-semibold text-lg text-slate-900 mb-2 leading-tight">{exam.title}</h4>
                                        <p className="text-xs font-mono text-slate-400 bg-slate-100 inline-block px-2 py-1 rounded">ID: {exam.id}</p>
                                    </div>
                                    <div className={`p-4 border-t ${isCompleted ? 'border-slate-200 bg-slate-50' : 'border-slate-100 bg-slate-50/50'}`}>
                                        <button onClick={() => prepareExam(exam.id, exam)} disabled={isCompleted} className={`w-full py-2.5 rounded-md font-semibold text-sm transition-colors border ${isCompleted ? 'bg-slate-200 text-slate-500 border-slate-300 cursor-not-allowed' : isActive ? 'bg-amber-100 text-amber-800 border-amber-200 hover:bg-amber-200' : 'bg-white text-blue-700 border-blue-200 hover:bg-blue-50 hover:border-blue-300'}`}>
                                            {isCompleted ? "Assessment Submitted" : isActive ? "Resume Assessment" : "Begin Assessment"}
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                        {exams.length === 0 && <div className="col-span-full py-12 text-center text-slate-500 bg-white border border-slate-200 rounded-lg border-dashed">No active assessments available at this time.</div>}
                    </div>
                )}
            </div>
        );
    }

    // --- 2b. GRADEBOOK VIEW ---
    function GradebookView({ user, db, onStartReview }) {
        const [sessions, setSessions] = React.useState([]);
        const [requests, setRequests] = React.useState({});

        React.useEffect(() => {
            const q = query(collection(db, "sessions"), where("userId", "==", user.uid), where("status", "==", "completed"));
            const unsubscribe = onSnapshot(q, (snap) => {
                const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                list.sort((a,b) => (b.startTime?.seconds || 0) - (a.startTime?.seconds || 0));
                setSessions(list);
            });
            const rQ = query(collection(db, "review_requests"), where("studentId", "==", user.uid));
            const unsubReq = onSnapshot(rQ, (snap) => {
                const reqMap = {};
                snap.docs.forEach(d => { const data = d.data(); reqMap[data.examId] = { status: data.status, id: d.id }; });
                setRequests(reqMap);
            });
            return () => { unsubscribe(); unsubReq(); };
        }, [user.uid]);

        const requestReview = async (session) => {
            try {
                await addDoc(collection(db, "review_requests"), {
                    studentId: user.uid, studentName: user.displayName, examId: session.examId, examTitle: session.examTitle, status: 'pending', requestedAt: serverTimestamp()
                });
            } catch (e) { alert("Error requesting review"); }
        };

        return (
            <div className="max-w-6xl mx-auto">
                <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 bg-slate-50">
                        <h3 className="font-semibold text-slate-800">Official Results Record</h3>
                    </div>
                    <table className="w-full text-left border-collapse">
                        <thead className="bg-white text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200">
                            <tr>
                                <th className="px-6 py-4 font-semibold">Module Title</th>
                                <th className="px-6 py-4 font-semibold">Administration Date</th>
                                <th className="px-6 py-4 font-semibold text-center">Score</th>
                                <th className="px-6 py-4 font-semibold text-right">Review Access</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {sessions.map(sess => {
                                const reqInfo = requests[sess.examId];
                                const reqStatus = reqInfo ? reqInfo.status : null;
                                const reqId = reqInfo ? reqInfo.id : null;
                                const score = sess.score !== undefined ? sess.score : '?';
                                const passed = score >= 75; // Standard nursing passing threshold is often higher
                                
                                return (
                                    <tr key={sess.id} className="hover:bg-slate-50 transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="font-semibold text-slate-900">{sess.examTitle}</div>
                                            <div className="text-xs font-mono text-slate-400 mt-0.5">ID: {sess.examId}</div>
                                        </td>
                                        <td className="px-6 py-4 text-sm text-slate-600">
                                            {sess.startTime ? new Date(sess.startTime.seconds * 1000).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'}) : 'N/A'}
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className={`text-center font-bold text-base px-3 py-1 rounded-md inline-block mx-auto w-full max-w-[80px] ${score >= 80 ? 'bg-green-50 text-green-700 border border-green-200' : score >= 75 ? 'bg-blue-50 text-blue-700 border border-blue-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                                                {score}%
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 text-right">
                                            {!reqStatus && <button onClick={() => requestReview(sess)} className="text-xs font-semibold text-slate-700 bg-white border border-slate-300 px-4 py-2 rounded-md hover:bg-slate-50 hover:text-blue-700 transition-colors inline-block">Request Rationale</button>}
                                            {reqStatus === 'pending' && <span className="text-xs font-semibold text-amber-700 bg-amber-50 border border-amber-200 px-3 py-2 rounded-md flex items-center justify-end gap-1.5 ml-auto w-fit"><Icon name="clock" size={14} /> Pending Auth</span>}
                                            {reqStatus === 'approved' && <button onClick={() => onStartReview(sess, reqId)} className="text-xs font-bold text-white bg-blue-700 border border-blue-800 px-4 py-2 rounded-md hover:bg-blue-800 transition-colors flex items-center justify-end gap-2 ml-auto shadow-sm"><Icon name="eye" size={14} /> Access Rationales</button>}
                                            {reqStatus === 'denied' && <span className="text-xs font-semibold text-red-700 bg-red-50 border border-red-200 px-3 py-2 rounded-md flex items-center justify-end gap-1.5 ml-auto w-fit"><Icon name="x" size={14} /> Access Denied</span>}
                                        </td>
                                    </tr>
                                );
                            })}
                            {sessions.length === 0 && <tr><td colSpan="4" className="px-6 py-12 text-center text-slate-500 bg-slate-50/50">No official records found.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    }

    // --- 3. EXAM INTERFACE (Distraction Free, High Contrast) ---
    function ExamInterface({ db, student, exam, questions, sessionId, onFinish }) {
        const [currentIndex, setCurrentIndex] = React.useState(0);
        const [selectedIndices, setSelectedIndices] = React.useState([]); 
        const [answers, setAnswers] = React.useState({});
        const [submitting, setSubmitting] = React.useState(false);
        const [timeLeft, setTimeLeft] = React.useState(null);
        
        const currentQ = questions[currentIndex];
        const isLast = currentIndex === questions.length - 1;
        
        // Disable text selection and right click to simulate secure exam browser
        React.useEffect(() => {
            const preventCopy = (e) => e.preventDefault();
            document.addEventListener('contextmenu', preventCopy);
            return () => document.removeEventListener('contextmenu', preventCopy);
        }, []);

        React.useEffect(() => {
            const limitMins = exam.timeLimit || 60;
            setTimeLeft(limitMins * 60);
            const timer = setInterval(() => { setTimeLeft(prev => { if (prev <= 1) { clearInterval(timer); handleFinish(true); return 0; } return prev - 1; }); }, 1000);
            return () => clearInterval(timer);
        }, []);

        const formatTime = (secs) => { const m = Math.floor(secs / 60); const s = secs % 60; return `${m}:${s < 10 ? '0' : ''}${s}`; };
        
        const handleOptionSelect = (optIdx) => { 
            if (currentQ.isSATA) { 
                if (selectedIndices.includes(optIdx)) setSelectedIndices(selectedIndices.filter(i => i !== optIdx)); 
                else setSelectedIndices([...selectedIndices, optIdx]); 
            } else { 
                setSelectedIndices([optIdx]); 
            } 
        };
        
        const handleNext = async () => {
            setSubmitting(true);
            try {
                const newAnswers = { ...answers, [currentQ.id]: selectedIndices };
                setAnswers(newAnswers);
                await updateDoc(doc(db, "sessions", sessionId), { [`answers.${currentQ.id}`]: { questionId: currentQ.id, selectedOptions: selectedIndices, timestamp: new Date().toISOString() }, currentQuestionIndex: currentIndex + 1, lastActive: serverTimestamp() });
                if (isLast) { await handleFinish(false, newAnswers); } else { setSelectedIndices([]); setCurrentIndex(prev => prev + 1); setSubmitting(false); }
            } catch (err) { alert("System Network Error. Please contact proctor."); setSubmitting(false); }
        };

        const handleFinish = async (forced = false, currentAnswers = answers) => {
            setSubmitting(true);
            try {
                let correctCount = 0;
                questions.forEach(q => {
                    const studentAns = currentAnswers[q.id] || [];
                    const correctAns = q.correctIndices || [q.correctAnswerIndex];
                    if ([...studentAns].sort().join(',') === [...correctAns].sort().join(',')) correctCount++;
                });
                await updateDoc(doc(db, "sessions", sessionId), { status: 'completed', score: Math.round((correctCount / questions.length) * 100) });
                onFinish();
            } catch(e) { console.error(e); }
        };

        return (
            <div className="flex flex-col h-full bg-white relative select-none">
                {/* Clinical Dark Header */}
                <header className="bg-slate-900 h-16 border-b border-slate-950 flex items-center justify-between px-6 shadow-md z-20 shrink-0 text-white">
                    <div className="flex items-center gap-4">
                        <div className="font-bold tracking-widest text-sm text-slate-400">EXAM ID: <span className="text-white font-mono font-normal">{exam.title.toUpperCase()}</span></div>
                        <div className="h-4 w-px bg-slate-700"></div>
                        <div className="text-sm font-medium text-slate-300">CANDIDATE: {student.name.toUpperCase()}</div>
                    </div>
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2 px-4 py-1.5 rounded bg-slate-800 border border-slate-700">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Item</span>
                            <span className="font-mono text-base">{currentIndex + 1} of {questions.length}</span>
                        </div>
                        <div className={`flex items-center gap-2 px-4 py-1.5 rounded font-mono text-xl tracking-wider ${timeLeft < 300 ? 'bg-red-900/50 text-red-400 border border-red-800/50' : 'bg-slate-800 text-white border border-slate-700'}`}>
                            <Icon name="clock" size={18} />
                            {timeLeft !== null ? formatTime(timeLeft) : '--:--'}
                        </div>
                    </div>
                </header>

                {/* Main Exam Area (Split) */}
                <div className="flex-1 flex overflow-hidden">
                    {/* Left side: Scenario / Question */}
                    <div className="w-1/2 p-10 overflow-y-auto bg-white border-r-2 border-slate-200 flex flex-col scroller">
                        {currentQ.isSATA && (
                            <div className="bg-blue-50 border-l-4 border-blue-600 p-4 mb-6 rounded-r-md flex items-start gap-3">
                                <Icon name="info" size={20} className="text-blue-700 shrink-0 mt-0.5" />
                                <div>
                                    <h4 className="font-bold text-blue-900 text-sm uppercase tracking-wide">Select All That Apply (SATA)</h4>
                                    <p className="text-blue-800 text-sm mt-1">Select all options that correctly answer the question. Partial credit is not awarded.</p>
                                </div>
                            </div>
                        )}
                        <div className="mb-2">
                            <span className="font-bold text-slate-500 uppercase tracking-wider text-xs border-b-2 border-blue-600 pb-1">Question {currentIndex + 1}</span>
                        </div>
                        <h2 className="text-xl md:text-2xl font-normal text-slate-900 leading-relaxed font-serif mt-4">
                            {currentQ.text}
                        </h2>
                    </div>

                    {/* Right side: Options & Controls */}
                    <div className="w-1/2 bg-slate-50 overflow-y-auto flex flex-col justify-between scroller">
                        <div className="p-10 space-y-4">
                            <div className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-6">Select Answer{currentQ.isSATA ? 's' : ''}:</div>
                            {currentQ.options.map((opt, idx) => { 
                                const isSelected = selectedIndices.includes(idx); 
                                return (
                                    <div key={idx} onClick={() => handleOptionSelect(idx)} className={`group relative p-5 rounded-md border cursor-pointer transition-all duration-150 flex items-start gap-4 ${isSelected ? 'border-blue-600 bg-blue-50/50 ring-1 ring-blue-600 shadow-sm' : 'border-slate-300 bg-white hover:border-blue-400 hover:bg-slate-50'}`}>
                                        <div className={`mt-0.5 shrink-0 transition-colors ${isSelected ? 'text-blue-600' : 'text-slate-400 group-hover:text-blue-400'}`}>
                                            {currentQ.isSATA ? (
                                                isSelected ? <Icon name="checkboxFilled" size={24} /> : <Icon name="checkboxEmpty" size={24} />
                                            ) : (
                                                isSelected ? <Icon name="radioFilled" size={24} /> : <Icon name="radioEmpty" size={24} />
                                            )}
                                        </div>
                                        <div className={`text-base leading-snug font-medium transition-colors ${isSelected ? 'text-slate-900' : 'text-slate-700'}`}>
                                            {opt}
                                        </div>
                                    </div>
                                ); 
                            })}
                        </div>
                        
                        {/* Footer Controls */}
                        <div className="p-8 border-t border-slate-200 bg-white flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                            <div className="text-sm font-mono text-slate-400">
                                {selectedIndices.length > 0 ? `${selectedIndices.length} option(s) selected` : 'Awaiting selection...'}
                            </div>
                            <button onClick={handleNext} disabled={selectedIndices.length === 0 || submitting} className={`px-10 py-3 rounded-md text-base font-bold flex items-center gap-2 transition-all ${selectedIndices.length === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-700 text-white hover:bg-blue-800 shadow-md'}`}>
                                {submitting ? 'Processing...' : (isLast ? 'Submit Assessment' : 'Next Item')} {!submitting && !isLast && <Icon name="chevronRight" size={20} />}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // --- 4. REVIEW INTERFACE (Official Report Style) ---
    function ReviewInterface({ db, session, questions, requestId, onClose }) {
        const [closing, setClosing] = React.useState(false);

        const handleCloseReview = async () => {
            setClosing(true);
            try {
                if (requestId) { await deleteDoc(doc(db, "review_requests", requestId)); }
            } catch(e) {
                console.warn("Delete review request failed, likely already deleted or permission issue.", e);
            } finally {
                onClose();
            }
        };

        const passed = session.score >= 75; // Arbitrary pass threshold for UI purposes

        return (
            <div className="flex flex-col h-full bg-slate-100">
                <header className="bg-white h-20 border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-20 shrink-0">
                    <div className="flex items-center gap-6">
                        <div className={`w-12 h-12 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-sm ${passed ? 'bg-green-600' : 'bg-red-600'}`}>
                            {session.score}%
                        </div>
                        <div>
                            <h1 className="text-xl font-bold text-slate-900">Official Rationale Report</h1>
                            <p className="text-sm font-medium text-slate-500">Module: {session.examTitle}</p>
                        </div>
                    </div>
                    <button onClick={handleCloseReview} disabled={closing} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-md font-semibold text-sm transition-colors flex items-center gap-2 shadow-sm border border-slate-900">
                        {closing ? "Securing Session..." : "End Review Session"} <Icon name="x" size={16} />
                    </button>
                </header>
                
                <div className="flex-1 overflow-y-auto scroller p-8">
                    <div className="max-w-4xl mx-auto space-y-8 pb-12">
                        {/* Summary Banner */}
                        <div className="bg-white rounded-lg p-6 border border-slate-200 shadow-sm flex items-start gap-4">
                            <Icon name="info" size={24} className="text-blue-600 shrink-0" />
                            <div>
                                <h3 className="font-bold text-slate-800 text-lg">Confidential Review Material</h3>
                                <p className="text-slate-600 text-sm mt-1">This document contains correct answers and clinical rationales. Reproduction or distribution is strictly prohibited. Closing this session will revoke access until requested again.</p>
                            </div>
                        </div>

                        {questions.map((q, idx) => {
                            const studentAns = session.answers[q.id] ? session.answers[q.id].selectedOptions : [];
                            const correctAns = q.correctIndices || [q.correctAnswerIndex];
                            const s1 = [...studentAns].sort().join(','); const s2 = [...correctAns].sort().join(',');
                            const isCorrect = s1 === s2;
                            
                            return (
                                <div key={q.id} className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
                                    {/* Question Header */}
                                    <div className={`px-6 py-4 border-b flex justify-between items-center ${isCorrect ? 'bg-green-50/50 border-green-100' : 'bg-red-50/50 border-red-100'}`}>
                                        <span className="font-bold text-slate-600 uppercase text-xs tracking-wider">Item {idx + 1}</span>
                                        {isCorrect ? 
                                            <span className="text-green-700 text-xs font-bold px-3 py-1 bg-green-100 rounded border border-green-200 flex items-center gap-1.5"><Icon name="check" size={14} /> Correct Response</span> 
                                            : 
                                            <span className="text-red-700 text-xs font-bold px-3 py-1 bg-red-100 rounded border border-red-200 flex items-center gap-1.5"><Icon name="alert" size={14} /> Incorrect Response</span>
                                        }
                                    </div>
                                    
                                    <div className="p-6">
                                        <h3 className="text-lg font-serif text-slate-900 mb-6 leading-relaxed">{q.text}</h3>
                                        
                                        <div className="space-y-3 mb-6">
                                            {q.options.map((opt, optIdx) => { 
                                                const isSelected = studentAns.includes(optIdx); 
                                                const isKey = correctAns.includes(optIdx); 
                                                
                                                let bgClass = "bg-white border-slate-200 text-slate-600"; 
                                                if (isKey) bgClass = "bg-green-50 border-green-400 text-green-900 font-medium ring-1 ring-green-400"; 
                                                else if (isSelected && !isKey) bgClass = "bg-red-50 border-red-300 text-red-900 font-medium"; 
                                                
                                                return (
                                                    <div key={optIdx} className={`p-4 rounded-md border flex items-start gap-4 transition-colors ${bgClass}`}>
                                                        <div className="mt-0.5">
                                                            {isKey ? <Icon name="check" size={20} className="text-green-600"/> : (isSelected ? <Icon name="x" size={20} className="text-red-600"/> : <div className="w-5 h-5 rounded-full border-2 border-slate-300"></div>)}
                                                        </div>
                                                        <span className="flex-1 text-base">{opt}</span>
                                                        <div className="flex gap-2 shrink-0">
                                                            {isSelected && !isKey && <span className="text-[10px] font-bold uppercase text-red-700 bg-red-100 px-2 py-1 rounded border border-red-200">Candidate Selected</span>}
                                                            {isKey && <span className="text-[10px] font-bold uppercase text-green-800 bg-green-200 px-2 py-1 rounded border border-green-300">Key Answer</span>}
                                                        </div>
                                                    </div>
                                                ); 
                                            })}
                                        </div>
                                        
                                        {q.rationale && (
                                            <div className="mt-6 p-5 bg-blue-50 border-l-4 border-blue-600 rounded-r-md">
                                                <span className="font-bold block mb-2 text-blue-900 uppercase text-xs tracking-wider flex items-center gap-2"><Icon name="book" size={16}/> Clinical Rationale</span>
                                                <p className="text-sm text-blue-900 leading-relaxed font-serif">{q.rationale}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
</html>
